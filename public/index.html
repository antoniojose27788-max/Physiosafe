    <script type="text/babel">
        const { motion, useScroll, useTransform } = window.Motion;
        const { useRef, useState, useEffect } = React;

        const FadeIn = ({ children, delay = 0, duration = 0.7, x = 0, y = 30, className, as: Component = 'div', ...props }) => {
            const MotionComponent = motion[Component] || motion.div;
            return (
                <MotionComponent
                initial={{ opacity: 0, x, y }}
                whileInView={{ opacity: 1, x: 0, y: 0 }}
                viewport={{ once: true, margin: "50px", amount: 0 }}
                transition={{ duration, delay, ease: [0.25, 0.1, 0.25, 1] }}
                className={className}
                {...props}
                >
                {children}
                </MotionComponent>
            );
        };

        const Magnet = ({ children, padding = 150, strength = 3, activeTransition = "transform 0.3s ease-out", inactiveTransition = "transform 0.6s ease-in-out", className = "" }) => {
            const ref = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [isActive, setIsActive] = useState(false);

            const handleMouseMove = (e) => {
                if (!ref.current) return;
                const { left, top, width, height } = ref.current.getBoundingClientRect();
                const centerX = left + width / 2;
                const centerY = top + height / 2;
                const distanceX = e.clientX - centerX;
                const distanceY = e.clientY - centerY;
                const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
                if (distance < (width / 2) + padding) {
                    setIsActive(true);
                    setPosition({ x: distanceX / strength, y: distanceY / strength });
                } else {
                    setIsActive(false);
                    setPosition({ x: 0, y: 0 });
                }
            };

            const handleMouseLeave = () => {
                setIsActive(false);
                setPosition({ x: 0, y: 0 });
            };

            useEffect(() => {
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div
                ref={ref}
                onMouseLeave={handleMouseLeave}
                className={className}
                style={{
                    transform: `translate3d(${position.x}px, ${position.y}px, 0)`,
                    transition: isActive ? activeTransition : inactiveTransition,
                    willChange: 'transform'
                }}
                >
                {children}
                </div>
            );
        };

        const ContactButton = ({ onClick, text = "Access Dashboard" }) => {
            return (
                <button
                onClick={onClick}
                className="rounded-full px-8 py-3 sm:px-10 sm:py-3.5 md:px-12 md:py-4 text-xs sm:text-sm md:text-base text-white font-medium uppercase tracking-widest relative z-50"
                style={{
                    background: 'linear-gradient(123deg, #18011F 7%, #B600A8 37%, #7621B0 72%, #BE4C00 100%)',
                    boxShadow: '0px 4px 4px rgba(181, 1, 167, 0.25), 4px 4px 12px #7721B1 inset',
                    outline: '2px solid white',
                    outlineOffset: '-3px'
                }}
                >
                {text}
                </button>
            );
        };

        const AnimatedText = ({ text, className = "" }) => {
            const containerRef = useRef(null);
            const { scrollYProgress } = useScroll({
                target: containerRef,
                offset: ["start 0.8", "end 0.2"]
            });

            const words = text.split("");

            return (
                <p ref={containerRef} className={className}>
                {words.map((char, i) => {
                    const start = i / words.length;
                    const end = start + (1 / words.length);
                    const opacity = useTransform(scrollYProgress, [start, end], [0.2, 1]);
                    return (
                        <span key={i} className="relative inline-block">
                            <span className="opacity-0">{char === " " ? "\u00A0" : char}</span>
                            <motion.span style={{ opacity }} className="absolute left-0 top-0">
                                {char === " " ? "\u00A0" : char}
                            </motion.span>
                        </span>
                    )
                })}
                </p>
            );
        };

                window.addEventListener('scroll', handleScroll, { passive: true });

            const gifs = [

                "https://motionsites.ai/assets/hero-aethera-preview-DknSlcTa.gif",

                "https://motionsites.ai/assets/hero-stellar-ai-preview-D3HL6bw1.gif",
                "https://motionsites.ai/assets/hero-xportfolio-preview-D4A8maiC.gif",
                "https://motionsites.ai/assets/hero-orbit-web3-preview-BXt4OttD.gif",
                "https://motionsites.ai/assets/hero-nexora-preview-cx5HmUgo.gif",
                "https://motionsites.ai/assets/hero-evr-ventures-preview-DZxeVFEX.gif",
                "https://motionsites.ai/assets/hero-planet-orbit-preview-DWAP8Z1P.gif",
                "https://motionsites.ai/assets/hero-new-era-preview-CocuDUm9.gif",
                "https://motionsites.ai/assets/hero-wealth-preview-B70idl_u.gif",

                "https://motionsites.ai/assets/hero-celestia-preview-0yO3jXO8.gif"

            const row1 = [...gifs.slice(0, 11), ...gifs.slice(0, 11), ...gifs.slice(0, 11)];

            return (

                    ))}
                </div>
                <div
                    className="flex gap-3"
                    style={{ transform: `translateX(${-(offset - 200)}px)`, willChange: 'transform' }}
                >
                    {row2.map((src, i) => (
                    <img key={i} src={src} alt="Work preview" loading="lazy" className="w-[420px] h-[270px] rounded-2xl object-cover shrink-0" />
                    ))}
                </div>
                </section>
            );
        };

        const AboutSection = () => {
            return (
                <section id="about" className="min-h-screen relative flex flex-col items-center justify-center px-5 sm:px-8 md:px-10 py-20 overflow-hidden bg-[#0C0C0C]">

                        About us
                    </h2>
                    </FadeIn>

                    <div className="flex flex-col items-center gap-16 sm:gap-20 md:gap-24">

                        className="text-[#D7E2EA] font-medium text-center leading-relaxed max-w-[560px] text-[clamp(1rem,2vw,1.35rem)]"
                    />
                    <ContactButton text="Acceder a Citas" onClick={(e) => {
                        e.preventDefault();
                        showLoginForm();
                        new bootstrap.Modal(document.getElementById('authModal')).show();
                    }} />
                    </div>
                </div>
                </section>
            );
        };

        const ServicesSection = () => {
            const services = [
                { num: "01", title: "Fisioterapia General", desc: "Creation of detailed plans for characters and patients tailored to specific client needs, ideal for games, products, and visualizations." },
                { num: "02", title: "Osteopatía", desc: "High-quality, photorealistic renders that showcase designs with custom lighting, textures, and materials to bring concepts to life." },
                { num: "03", title: "Rehabilitación Deportiva", desc: "Dynamic animations and motion graphics that add energy and storytelling to brands, products, and digital experiences." },
                { num: "04", title: "Punción Seca", desc: "Crafting cohesive visual identities -- from logos to full brand systems -- that communicate a clear and memorable presence." },
                { num: "05", title: "Readaptación", desc: "Designing clean, modern, and conversion-focused websites with attention to layout, typography, and user experience." }
            ];
            return (
                <section id="services" className="bg-[#FFFFFF] rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] px-5 sm:px-8 md:px-10 py-20 sm:py-24 md:py-32 relative z-20">
                <h2 className="text-[#0C0C0C] font-black uppercase text-center text-[clamp(3rem,12vw,160px)] mb-16 sm:mb-20 md:mb-28">
                    Services
                </h2>

                <div className="max-w-5xl mx-auto flex flex-col">
                    {services.map((s, i) => (
                    <FadeIn

                    >
                        <div className="font-black text-[#0C0C0C] text-[clamp(3rem,10vw,140px)] leading-none shrink-0">
                        {s.num}
                        </div>
                        <div className="flex flex-col gap-3">
                        <h3 className="font-medium uppercase text-[#0C0C0C] text-[clamp(1rem,2.2vw,2.1rem)]">
                            {s.title}

                            {s.desc}

                    </FadeIn>
                    ))}

                </section>
            );
        };



        const LiveProjectButton = () => {
            return (
                <button className="rounded-full border-2 border-[#D7E2EA] text-[#D7E2EA] font-medium uppercase tracking-widest px-8 py-3 sm:px-10 sm:py-3.5 text-sm sm:text-base hover:bg-[#D7E2EA]/10 transition-colors">

        const ProjectsSection = () => {
            const projects = [
                {
                    num: "01", client: "Client", name: "Nextlevel Studio",
                    images: [
                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055344_5eff02e0-87a5-41ce-b64f-eb08da8f33db.png&w=1280&q=85",

                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055654_911201c5-36d9-4bc6-bac7-331adfce159f.png&w=1280&q=85",
                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055723_5ceda0b8-d9c2-4665-b2e3-83ba19ba76d1.png&w=1280&q=85",
                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055753_adc5dcbd-a8e6-49c0-b43a-9b030d835cea.png&w=1280&q=85"
                    ]
                },
                {
                    num: "03", client: "Client", name: "Solaris Digital",
                    images: [
                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055759_963cfb0b-4bd1-4b0f-9d0a-09bd6cf95b2f.png&w=1280&q=85",
                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_060108_438f781a-9846-4dcc-89ab-c4e6cb830f5b.png&w=1280&q=85",
                    "https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260412_055818_9d062121-ad7e-46b9-999a-1a6a692ef1ee.png&w=1280&q=85"
                    ]
                }
            ];

            const ProjectCard = ({ project, index, total }) => {
                const cardRef = useRef(null);
                const { scrollYProgress } = useScroll({
                    target: cardRef,
                    offset: ["start end", "start start"]
                });

                const targetScale = 1 - (total - 1 - index) * 0.03;
                const scale = useTransform(scrollYProgress, [0, 1], [1, targetScale]);

                return (
                    <div
                    ref={cardRef}
                    className="sticky h-[85vh] flex items-center justify-center top-24 md:top-32"
                    style={{ top: `calc(6rem + ${index * 28}px)` }}
                    >
                    <motion.div
                        style={{ scale }}
                        className="w-full max-w-6xl rounded-[40px] sm:rounded-[50px] md:rounded-[60px] border-2 border-[#D7E2EA] bg-[#0C0C0C] p-4 sm:p-6 md:p-8 flex flex-col gap-6 sm:gap-8"
                    >
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
                        <div className="flex items-center gap-6 sm:gap-8">
                            <span className="font-black text-[#D7E2EA] text-[clamp(3rem,8vw,100px)] leading-none">{project.num}</span>
                            <div className="flex flex-col">
                            <span className="text-[#D7E2EA] opacity-60 text-sm uppercase tracking-widest mb-1">{project.client}</span>
                            <h3 className="font-medium text-[#D7E2EA] text-2xl sm:text-3xl md:text-4xl">{project.name}</h3>
                            </div>
                        </div>
                        <LiveProjectButton />
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 sm:gap-6 md:gap-8 h-full min-h-[300px]">
                        <div className="flex flex-col gap-4 sm:gap-6 md:gap-8 w-full sm:w-[40%]">
                            <img src={project.images[0]} className="w-full h-[clamp(130px,16vw,230px)] object-cover rounded-[40px] sm:rounded-[50px] md:rounded-[60px]" alt="Project shot 1" />
                            <img src={project.images[1]} className="w-full h-[clamp(160px,22vw,340px)] object-cover rounded-[40px] sm:rounded-[50px] md:rounded-[60px]" alt="Project shot 2" />
                        </div>
                        <div className="w-full sm:w-[60%] h-full">
                            <img src={project.images[2]} className="w-full h-full min-h-[300px] object-cover rounded-[40px] sm:rounded-[50px] md:rounded-[60px]" alt="Project main shot" />
                        </div>
                        </div>
                    </motion.div>
                    </div>
                );
            };

            return (
                <section id="projects" className="bg-[#0C0C0C] rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] -mt-10 sm:-mt-12 md:-mt-14 relative z-30 pt-20 pb-32 px-5 sm:px-8 md:px-10">
                <h2 className="hero-heading font-black uppercase text-center text-[clamp(3rem,12vw,160px)] mb-16 sm:mb-20">
                    Project
                </h2>

                <div className="flex flex-col relative w-full pb-[10vh]">
                    {projects.map((p, i) => (
                    <ProjectCard key={i} project={p} index={i} total={projects.length} />
                    ))}
                </div>
                </section>
            );
        };

        const App = () => {
            return (
                <div className="overflow-x-clip text-white min-h-screen bg-[#0C0C0C] main-wrapper">
                    <HeroSection />
                    <MarqueeSection />
                    <AboutSection />
                    <ServicesSection />
                    <ProjectsSection />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
