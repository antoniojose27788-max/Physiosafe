version: '3.8'
services:
  db:
    image: postgres:15
    container_name: physiosafe_db
    environment:
      POSTGRES_USER: physiouser
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: physiodb
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - physio-network

  web-app:
    image: node:18-alpine
    container_name: physiosafe_web
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ./app:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - physio-network

  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: physiosafe_bot_builder
    environment:
      - DATABASE_URL=postgresql://physiouser:SecretPassword123!@db:5432/physiodb
      - ENCRYPTION_SECRET=ClaveSuperSecretaPhysioSafe2026!
      - NEXTAUTH_URL=http://localhost:8081
      - NEXT_PUBLIC_VIEWER_URL=http://localhost:8082
    ports:
      - "8081:3000"
    depends_on:
      - db
    networks:
      - physio-network

  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: physiosafe_bot_viewer
    environment:
      - DATABASE_URL=postgresql://physiouser:SecretPassword123!@db:5432/physiodb
      - ENCRYPTION_SECRET=ClaveSuperSecretaPhysioSafe2026!
      - CORS_ORIGIN=*
    ports:
      - "8082:3000"
    depends_on:
      - db
    networks:
      - physio-network

networks:
  physio-network:
    driver: bridge